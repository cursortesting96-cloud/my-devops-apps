<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App B Frontend - Dummy</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f4f8; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #1a82e0; }
        p { color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h1>App B Frontend</h1>
        <p>This is a dummy implementation for DevOps verification.</p>
        <p>Domain: <span id="domain">app-b.local</span></p>
        <div id="api-status">Checking API...</div>
    </div>
    <script>
        fetch('http://api.app-b.local/index.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('api-status').innerText = 'API Response: ' + data.message;
                document.getElementById('api-status').style.color = 'green';
            })
            .catch(err => {
                document.getElementById('api-status').innerText = 'API Connection Failed (Ensure api.app-b.local is mapped in hosts)';
                document.getElementById('api-status').style.color = 'red';
            });
    </script>
</body>
</html>
